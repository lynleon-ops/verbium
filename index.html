<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --bg:#f6f8fa; --bg2:#ffffff; --bg3:#eaeef2; --ink:#1f2328; --ink50:#636c76; --ink30:#8c959f;
  --gold:#0969da; --gold-lt:rgba(9,105,218,.1); --rust:#d1242f; --rust-lt:rgba(209,36,47,.08);
  --border:#d0d7de; --border-md:#afb8c1;
  --shadow-sm:0 1px 3px rgba(31,35,40,.12); --shadow-md:0 3px 6px rgba(140,149,159,.15); --shadow-lg:0 8px 24px rgba(140,149,159,.2);
  --th-bg:#1f2328; --radius:6px;
  --green:#1a7f37; --green-lt:rgba(26,127,55,.1);
}
[data-theme="dark"] {
  --bg:#0d1117; --bg2:#161b22; --bg3:#1c2128;
  --ink:#e6edf3; --ink50:#848d97; --ink30:#6e7681;
  --gold:#4493f8; --gold-lt:rgba(68,147,248,.15); --rust:#f85149; --rust-lt:rgba(248,81,73,.1);
  --border:#30363d; --border-md:#484f58;
  --shadow-sm:0 1px 3px rgba(1,4,9,.8); --shadow-md:0 3px 6px rgba(1,4,9,.5); --shadow-lg:0 8px 24px rgba(1,4,9,.4);
  --th-bg:#010409;
  --green:#3fb950; --green-lt:rgba(63,185,80,.1);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg3);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;justify-content:center;align-items:stretch;padding:0}
.app{width:100%;max-width:1360px;display:flex;flex-direction:column;min-height:0;background:var(--bg);border-left:1px solid var(--border);border-right:1px solid var(--border)}

/* Two-column layout */
.app-body{flex:1;display:flex;min-height:0;overflow:hidden}

/* Left sidebar */
.sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:10px;border-bottom:1px solid var(--border)}
.sidebar-new-btn{display:flex;align-items:center;gap:8px;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--ink);padding:9px 12px;font-size:.8rem;font-weight:600;cursor:pointer;box-shadow:var(--shadow-sm)}
.sidebar-new-btn:hover{border-color:var(--gold);color:var(--gold)}
.sidebar-sort{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border)}
.sidebar-sort-btn{flex:1;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--ink50);font-size:.66rem;padding:4px 6px;cursor:pointer;text-transform:uppercase;letter-spacing:.03em;font-weight:600}
.sidebar-sort-btn:hover{border-color:var(--gold);color:var(--ink)}
.sidebar-sort-btn.active{background:var(--gold);border-color:var(--gold);color:#fff}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.sidebar-card{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:10px 12px;margin-bottom:6px;cursor:pointer;box-shadow:var(--shadow-sm);transition:border-color .15s}
.sidebar-card:hover{border-color:var(--gold)}
.sidebar-card.active{border-color:var(--gold);background:var(--gold-lt)}
.sidebar-card-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.sidebar-card-title{font-size:.82rem;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sidebar-card-sub{font-size:.62rem;color:var(--ink50);margin-top:3px}
.sidebar-card-del{background:transparent;border:none;color:var(--ink50);cursor:pointer;padding:3px;border-radius:4px;line-height:0;font-size:inherit;font-weight:normal;letter-spacing:normal;text-transform:none;min-width:0}
.sidebar-card-del:hover{color:var(--rust);background:var(--rust-lt)}
.sidebar-empty{color:var(--ink50);font-size:.78rem;padding:16px 8px;line-height:1.6;text-align:center}
.sidebar-folder{padding:6px 10px;border-top:1px solid var(--border);font-size:11px;color:var(--ink50)}
.sidebar-folder button{font-size:11px;padding:4px 8px;margin-top:4px;width:100%;text-transform:none;letter-spacing:0;font-weight:500}

/* Ribbon toolbar */
.ribbon{display:flex;align-items:stretch;gap:2px;background:var(--bg2);border-bottom:1px solid var(--border);padding:5px 10px;flex-shrink:0;overflow-x:auto}
.ribbon::-webkit-scrollbar{height:0}
.ribbon-btn{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:5px;min-width:62px;padding:6px 10px;border:none;background:transparent;border-radius:8px;cursor:pointer;color:var(--ink50);text-transform:uppercase;letter-spacing:.05em;font-size:.6rem;font-weight:600;line-height:1;flex-shrink:0}
.ribbon-btn:hover:not(.active){background:var(--bg3);color:var(--ink)}
.ribbon-btn svg{width:22px;height:22px;color:var(--ink50)}
.ribbon-btn .ribbon-label{white-space:nowrap}
.ribbon-btn .ic-new{color:var(--gold)}
.ribbon-btn .ic-folder{color:#bf8700}
.ribbon-btn.connected .ic-folder{color:var(--green)}
.ribbon-btn.active{background:var(--gold);color:#fff}
.ribbon-btn.active svg{color:#fff}
.ribbon-sep{width:1px;background:var(--border);margin:6px 6px;flex-shrink:0}

/* Sidebar title + search */
.sidebar-title-row{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:.68rem;color:var(--ink50);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
#poem-search{padding:8px 10px;border-bottom:1px solid var(--border)}
#poem-search input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--ink);font:inherit;font-size:.8rem;outline:none}
#poem-search input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-lt)}

/* Right main panel */
.main-panel{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* Tabs bar */
.tabsbar{display:flex;align-items:stretch;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.tabsbar::-webkit-scrollbar{height:0}
.tabpill{display:flex;align-items:center;gap:6px;padding:8px 12px;border-right:1px solid var(--border);cursor:pointer;white-space:nowrap;font-size:.78rem;color:var(--ink50);max-width:180px;flex-shrink:0;min-width:80px;position:relative}
.tabpill:hover{background:var(--bg3);color:var(--ink)}
.tabpill.active{background:var(--bg);color:var(--ink);border-bottom:2px solid var(--gold);margin-bottom:-1px}
.tabpill .tname{overflow:hidden;text-overflow:ellipsis;flex:1}
.tabpill .dirty{color:var(--rust);font-size:1rem;line-height:1}
.tabpill .tclose{background:transparent;border:none;color:var(--ink50);cursor:pointer;padding:2px 3px;border-radius:4px;font-size:.8rem;line-height:1;min-width:0;letter-spacing:0;text-transform:none;font-weight:normal}
.tabpill .tclose:hover{background:var(--border);color:var(--ink)}
.tab-add{border:none;background:transparent;color:var(--ink50);cursor:pointer;padding:0 14px;font-size:1.1rem;flex-shrink:0;letter-spacing:0;text-transform:none;font-weight:normal}
.tab-add:hover{color:var(--gold);background:none}

/* Tab content panels */
.tab-panels{flex:1;overflow:hidden;position:relative}
.tab-panel{display:none;flex-direction:column;gap:8px;padding:16px;height:100%;overflow-y:auto;box-sizing:border-box}
.tab-panel.active{display:flex}

/* Empty state */
.editor-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--ink50);text-align:center;padding:40px}
.editor-empty svg{opacity:.3}
.editor-empty p{margin:0;font-size:.88rem}

/* Header */
.header{background:var(--bg2);border:1px solid var(--border);border-top:3px solid var(--gold);padding:0;overflow:visible}



h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:500;letter-spacing:.38em;line-height:1;color:var(--ink);text-transform:uppercase;margin:0}
h1 em{font-style:normal;color:var(--gold)}




/* Input box */
.box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%}
h2{color:var(--rust);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;margin:0 0 16px;display:block}
textarea{width:100%;min-height:160px;resize:vertical;background:var(--bg2);border:1px solid var(--border);padding:16px;color:var(--ink);font:inherit;font-size:.95rem;line-height:1.6;outline:none}
textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-lt)}
.actions{display:flex;flex-wrap:wrap;gap:8px;padding-top:12px}
.status{min-height:18px;padding-top:8px;font-size:12px;letter-spacing:.04em;color:var(--ink50)}

/* Buttons */
button{border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);color:var(--ink);padding:9px 24px;font-family:Inter,sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
button:hover:not(:disabled):not(.btn-primary):not(.btn-dark){background:var(--bg)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--gold);color:#fff;border-color:var(--gold);transition:background .2s}
.btn-primary:hover{background:#3d2e08}
.btn-dark{background:var(--th-bg);color:var(--bg);border-color:var(--th-bg);transition:background .15s,transform .1s}
.btn-dark:hover{background:#3a3a4a;color:#fff;border-color:#3a3a4a}
.btn-dark:active{background:#111118;transform:scale(.97)}

/* Metrics grid */
.metrics-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
.metric-card{background:rgba(255,255,255,.92);box-shadow:var(--shadow-sm);padding:14px}
[data-theme="dark"] .metric-card{background:rgba(46,46,56,.95)}
.metric-card:nth-child(even){background:rgba(240,236,228,.65)}
[data-theme="dark"] .metric-card:nth-child(even){background:rgba(38,38,48,.95)}
.metric-label{color:var(--ink50);font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.metric-value{margin-top:6px;color:var(--gold);font-size:1rem;font-weight:600;line-height:1.1}

/* Bars */
.bars-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.bars{height:280px;display:flex;align-items:flex-end;gap:4px;overflow-x:auto;padding-bottom:4px}
.bar-item{display:flex;min-width:44px;flex:1 0 44px;flex-direction:column;align-items:center;gap:4px}
.bar-area{height:180px;width:100%;display:flex;align-items:flex-end}
.bar-fill{width:100%;min-height:4px;background:var(--gold)}
.bar-top-num{font-size:11px;font-weight:700;color:var(--ink50)}

.bar-lbl{font-size:9px;font-weight:600;text-align:center;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.empty{align-self:center;color:var(--ink50);font-size:14px}

/* Table */

table{width:100%;min-width:980px;table-layout:fixed;border-collapse:separate;border-spacing:0;text-align:left;font-size:14px}
.td-divided{word-break:break-word;white-space:normal;max-width:380px}
.syl-line{white-space:normal;line-height:1.8}
thead th{background:var(--th-bg);color:var(--bg);border:0;padding:12px 16px;font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase}
tbody td{border:0;padding:16px;vertical-align:top}
tbody tr{background:rgba(255,255,255,.92)}
[data-theme="dark"] tbody tr{background:rgba(46,46,56,.95)}
tbody tr:nth-child(even){background:rgba(240,236,228,.55)}
[data-theme="dark"] tbody tr:nth-child(even){background:rgba(38,38,48,.95)}
tbody tr:hover{background:var(--rust-lt)}



.td-rhyme{font-weight:700;color:var(--gold)}
.sinalefa-mark{color:var(--gold);font-weight:600}
.hiato-mark{color:#1e3a8a;font-weight:600}
.hiato-met-mark{color:#1d4ed8;font-weight:600}
.sineresis-mark{color:#15803d;font-weight:600}
.dieresis-mark{color:#7e22ce;font-weight:600}

/* Acento Rítmico */


/* File browser */
.saved-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:4px}
.saved-empty,.file-empty{grid-column:1/-1;padding:32px 16px;color:var(--ink50);font-size:.85rem;text-align:center;letter-spacing:.04em;font-style:italic}
.saved-card{display:flex;flex-direction:column;align-items:center;gap:0;background:rgba(255,255,255,.92);box-shadow:var(--shadow-sm);padding:12px 8px 10px;cursor:pointer;border-bottom:2px solid transparent}
[data-theme="dark"] .saved-card{background:rgba(46,46,56,.95)}
.saved-card:nth-child(even){background:rgba(240,236,228,.65)}
[data-theme="dark"] .saved-card:nth-child(even){background:rgba(38,38,48,.95)}
.saved-card:hover{background:var(--gold-lt);box-shadow:var(--shadow-md)}
.saved-card.selected{background:var(--gold-lt);border-bottom:2px solid var(--gold)}
.file-icon-wrap{position:relative;width:86px;height:104px;flex:0 0 104px;display:block}
.file-body{width:86px;height:104px;background:var(--bg2);border:1.5px solid var(--border-md);position:absolute;top:0;left:0}
.file-fold-cover{width:26px;height:26px;background:var(--bg2);position:absolute;top:0;right:0;clip-path:polygon(0 0,100% 0,0 100%);border-top:1.5px solid var(--border-md);border-left:1.5px solid var(--border-md);z-index:2}
.file-fold{width:26px;height:26px;background:var(--bg);position:absolute;top:0;right:0;clip-path:polygon(0 100%,100% 100%,0 0);z-index:1}
.file-lines{position:absolute;top:30px;left:10px;right:10px;display:flex;flex-direction:column;gap:6px}
.file-line{height:1.5px;background:var(--border-md)}
.file-line.gold{background:var(--gold);opacity:.7}
.saved-info{width:100%;text-align:center}
.saved-name{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.82rem;font-weight:700;color:rgb(139,58,15);text-align:center;width:100%;margin-top:6px}
.saved-date, .file-date{display:none}
.saved-actions{display:flex;gap:8px;padding:12px 0 4px;flex-wrap:wrap}

/* Footer */
.footer{background:var(--bg2);border:1px solid var(--border);border-bottom:2px solid var(--gold);padding:16px 20px;font-size:13px;letter-spacing:.04em;display:flex;gap:12px;align-items:center;flex-wrap:wrap;color:var(--ink50)}
.footer-sep{width:1px;height:12px;background:var(--border-md)}

<script>



/* ── Constants ──────────────────────────────────────────── */
const VOWELS        = new Set('aeiouáéíóúüŵẅ');
const STRONG        = new Set('aeoáéó');
const WEAK          = new Set('iuüŵẅ');
const WEAK_ACCENT   = new Set('íú');
const UNACCENT_MAP  = {á:'a',é:'e',í:'i',ó:'o',ú:'u',ü:'u'};
const ONSET_CLUSTERS= new Set(['bl','br','cl','cr','dr','fl','fr','gl','gr','pl','pr','tr','ch','ll','rr','qŵ','gŵ','gẅ']);
const VERSE_NAMES   = {2:'Bisílabo',3:'Trisílabo',4:'Tetrasílabo',5:'Pentasílabo',6:'Hexasílabo',7:'Heptasílabo',8:'Octosílabo',9:'Eneasílabo',10:'Decasílabo',11:'Endecasílabo',12:'Dodecasílabo',14:'Alejandrino'};
const STRIP_PUNCT   = /[¿¡.,;:!?"«»""''()\[\]\-–—]/g;
const REGULAR_COUNTS= new Set([8, 11, 14]);
const STORAGE_KEY   = 'verbium_poems';

/* ── Tabs engine ─────────────────────────────────────────── */
let tabs = [];       // {id, name, poem, dirty, results}
let activeTabId = null;
let nextTabId = 1;

function getActiveTab() { return tabs.find(t=>t.id===activeTabId)||null; }

function openNewTab(poem=null) {
  const id = nextTabId++;
  const name = poem ? poem.name : 'Sin título';
  const tab = { id, name, poem, text: poem?poem.text:'', dirty:false, results:null };
  tabs.push(tab);
  renderTabsBar();
  return tab;
}

function activateTab(id) {
  activeTabId = id;
  // Hide all panels
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tabpill').forEach(p=>p.classList.remove('active'));
  // Show selected
  const panel = document.getElementById('panel-'+id);
  if (panel) panel.classList.add('active');
  const pill = document.getElementById('pill-'+id);
  if (pill) pill.classList.add('active');
  // Hide empty state
  const empty = document.getElementById('editor-empty');
  if (empty) empty.style.display = tabs.length ? 'none' : 'flex';
  // Update sidebar highlight
  renderSidebar();
}

function closeTab(id) {
  const tab = tabs.find(t=>t.id===id);
  if (tab && tab.dirty) {
    if (!confirm('¿Cerrar "'+tab.name+'" sin guardar?')) return;
  }
  tabs = tabs.filter(t=>t.id!==id);
  // Remove DOM elements
  const pill = document.getElementById('pill-'+id);
  const panel = document.getElementById('panel-'+id);
  if (pill) pill.remove();
  if (panel) panel.remove();
  // Activate another tab
  if (activeTabId === id) {
    activeTabId = tabs.length ? tabs[tabs.length-1].id : null;
    if (activeTabId) activateTab(activeTabId);
    else {
      const empty = document.getElementById('editor-empty');
      if (empty) empty.style.display = 'flex';
    }
  }
  renderSidebar();
}

function renderTabsBar() {
  const bar = document.getElementById('tabsbar');
  bar.innerHTML = '';
  tabs.forEach(tab => {
    const pill = document.createElement('div');
    pill.className = 'tabpill' + (tab.id===activeTabId?' active':'');
    pill.id = 'pill-'+tab.id;
    pill.onclick = () => activateTab(tab.id);
    pill.innerHTML = `<span class="tname">${escHtml(tab.name)}</span>${tab.dirty?'<span class="dirty">●</span>':''}<button class="tclose" onclick="event.stopPropagation();closeTab(${tab.id})" title="Cerrar">✕</button>`;
    bar.appendChild(pill);
  });
}

function createTabPanel(tab) {
  const existing = document.getElementById('panel-'+tab.id);
  if (existing) return;
  const panel = document.createElement('div');
  panel.className = 'tab-panel';
  panel.id = 'panel-'+tab.id;
  panel.innerHTML = `
    <div class="box">
      <h2>Escribe o pega tu poema</h2>
      <textarea id="ta-${tab.id}" placeholder="Pega o escribe aquí tu poema..." style="width:100%;min-height:160px;resize:vertical;background:var(--bg2);border:1px solid var(--border);padding:16px;color:var(--ink);font:inherit;font-size:.95rem;line-height:1.6;outline:none">${escHtml(tab.text)}</textarea>
      <div class="status" id="status-${tab.id}">Versos: <span id="vc-${tab.id}">0</span></div>
      <div class="actions">
        <button onclick="analyzeActiveTab()">Analizar</button>
        <button onclick="clearActiveTab()">Limpiar</button>
        <button onclick="copyActiveTab()">Copiar</button>
        <button class="btn-primary" style="margin-left:auto;display:inline-flex;align-items:center;gap:6px" onclick="saveActiveTab()"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"><path d="M2.75 2h7.19a.75.75 0 0 1 .53.22l2.31 2.31a.75.75 0 0 1 .22.53v8.19a.75.75 0 0 1-.75.75H2.75a.75.75 0 0 1-.75-.75V2.75A.75.75 0 0 1 2.75 2Z"/><path d="M4.75 2v3.5h5.5V2"/><path d="M4.75 14V9.25h6.5V14"/></svg>Guardar</button>
      </div>
    </div>
    <div id="results-${tab.id}" style="display:none;flex-direction:column;gap:8px">
      <div class="box" style="padding:0">
        <div style="padding:16px 24px"><h2 style="margin:0">Métricas Generales</h2></div>
        <div style="padding:16px 24px"><div class="metrics-grid" id="mg-${tab.id}"></div></div>
      </div>
      <div class="bars-box">
        <h2>Distribución silábica</h2>
        <div class="bars" id="bc-${tab.id}"></div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);width:100%;overflow:hidden">
        <div style="padding:16px 24px"><h2 style="margin:0">División Silábica</h2></div>
        <div style="overflow-x:auto">
          <table style="width:100%;min-width:700px;border-collapse:collapse;font-size:14px;table-layout:fixed">
            <thead><tr>
              <th style="width:3rem;padding:12px 16px;text-align:left;background:var(--th-bg);color:var(--bg);font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase">#</th>
              <th style="width:32%;padding:12px 16px;text-align:left;background:var(--th-bg);color:var(--bg);font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase">Verso</th>
              <th style="width:38%;padding:12px 16px;text-align:left;background:var(--th-bg);color:var(--bg);font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase">División silábica</th>
              <th style="width:5rem;padding:12px 16px;text-align:left;background:var(--th-bg);color:var(--bg);font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase">Sílabas</th>
              <th style="width:4rem;padding:12px 16px;text-align:left;background:var(--th-bg);color:var(--bg);font-size:.68rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase">Rima</th>
            </tr></thead>
            <tbody id="rb-${tab.id}"></tbody>
          </table>
        </div>
      </div>
    </div>`;

  // Append panel to DOM first
  document.getElementById('tab-panels').appendChild(panel);

  // Wait for DOM to update before attaching events
  setTimeout(() => {
    const ta = document.getElementById('ta-'+tab.id);
    if (!ta) return;
    ta.addEventListener('input', () => {
      tab.text = ta.value;
      tab.dirty = true;
      const lines = ta.value.split('\n').filter(l=>l.trim()).length;
      const vc = document.getElementById('vc-'+tab.id);
      if (vc) vc.textContent = lines;
      // Update pill dirty indicator
      const pill = document.getElementById('pill-'+tab.id);
      if (pill) pill.innerHTML = `<span class="tname">${escHtml(tab.name)}</span><span class="dirty">●</span><button class="tclose" onclick="event.stopPropagation();closeTab(${tab.id})" title="Cerrar">✕</button>`;
      // Auto-analyze
      debounceAnalyze();
    });
    ta.addEventListener('keydown', e => { if(e.key==='Enter'&&e.ctrlKey) analyzePoem(); });
    // Set initial verse count
    const lines = tab.text.split('\n').filter(l=>l.trim()).length;
    const vc = document.getElementById('vc-'+tab.id);
    if (vc) vc.textContent = lines;
    // Set textarea value
    ta.value = tab.text || '';
  }, 0);
}

// Bridge functions — these replace the old global functions
async function saveActiveTab() {
  const tab = getActiveTab();
  if (!tab) return;
  const ta = document.getElementById('ta-'+tab.id);
  if (!ta || !ta.value.trim()) { showToast('No hay poema para guardar'); return; }
  tab.text = ta.value;
  // If no poem linked yet, ask for name
  if (!tab.poem) {
    forceNameThenSave(tab);
  } else {
    // Overwrite existing
    await writePoemToStorage(tab, tab.poem.name, tab.text);
  }
}

function clearActiveTab() {
  const tab = getActiveTab(); if (!tab) return;
  const ta = document.getElementById('ta-'+tab.id); if (!ta) return;
  ta.value = '';
  tab.text = '';
  const vc = document.getElementById('vc-'+tab.id);
  if (vc) vc.textContent = 0;
  document.getElementById('results-'+tab.id).style.display = 'none';
  tab.results = null;
}

async function copyActiveTab() {
  const tab = getActiveTab(); if (!tab) return;
  const ta = document.getElementById('ta-'+tab.id); if (!ta) return;
  try { await navigator.clipboard.writeText(ta.value); showToast('Copiado'); } catch(e) {}
}

function analyzeActiveTab() {
  const tab = getActiveTab(); if (!tab) return;
  const ta = document.getElementById('ta-'+tab.id); if (!ta) return;
  // Temporarily set global IDs so existing analyzePoem works
  window._activeTabId = tab.id;
  analyzePoem();
}

/* ── Sidebar ─────────────────────────────────────────────── */
let sortMode = 'date';
let searchQuery = '';

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('sort-date').classList.toggle('active', mode==='date');
  document.getElementById('sort-az').classList.toggle('active', mode==='az');
  renderSidebar();
}

function toggleSearch() {
  const bar = document.getElementById('poem-search');
  const btn = document.getElementById('btn-search');
  const input = document.getElementById('poem-search-input');
  if (!bar) return;
  const show = bar.style.display === 'none' || !bar.style.display;
  bar.style.display = show ? 'block' : 'none';
  if (btn) btn.classList.toggle('active', show);
  if (show) { if (input) input.focus(); }
  else { searchQuery=''; if (input) input.value=''; renderSidebar(); }
}

function setSearchQuery(q) {
  searchQuery = q;
  renderSidebar();
}

function newPoem() {
  const tab = openNewTab(null);
  createTabPanel(tab);
  activateTab(tab.id);
  // Ask for name after panel is created
  setTimeout(() => forceNameThenSave(tabs[tabs.length-1]), 50);
}

function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  if (!list) return;
  // Delegación de eventos: un solo listener para abrir/borrar (robusto ante
  // nombres de archivo con caracteres especiales).
  if (!list.dataset.bound) {
    list.dataset.bound = '1';
    list.addEventListener('click', onSidebarClick);
  }
  let poems = getSavedPoems();
  if (sortMode === 'az') poems = [...poems].sort((a,b)=>a.name.localeCompare(b.name,'es'));
  else poems = [...poems].sort((a,b)=>new Date(b.date)-new Date(a.date));

  const q = searchQuery.trim().toLowerCase();
  if (q) poems = poems.filter(p => p.name.toLowerCase().includes(q));

  if (!poems.length) {
    list.innerHTML = q
      ? '<div class="sidebar-empty">Sin coincidencias para "' + escHtml(searchQuery.trim()) + '".</div>'
      : '<div class="sidebar-empty">No hay poemas guardados aún.<br>Haz clic en <strong>Nueva</strong> para comenzar.</div>';
    return;
  }

  const now = new Date();
  list.innerHTML = poems.map(p => {
    const d = new Date(p.date);
    const isToday = d.toDateString()===now.toDateString();
    const isYest  = new Date(now-86400000).toDateString()===d.toDateString();
    const dateStr = isToday ? 'Hoy, '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')
                  : isYest  ? 'Ayer'
                  : d.getDate()+' '+['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()]+' '+d.getFullYear();
    const activeTab = getActiveTab();
    const activePoemId = activeTab && activeTab.poem ? activeTab.poem.id : null;
    const active = p.id==activePoemId ? ' active' : '';
    const idAttr = escHtml(String(p.id)).replace(/"/g,'&quot;');
    return `<div class="sidebar-card${active}" data-id="${idAttr}">
      <div class="sidebar-card-top">
        <span class="sidebar-card-title">${escHtml(p.name)}</span>
        <button class="sidebar-card-del" data-id="${idAttr}" title="Eliminar">

async function deletePoemDirect(id) {
  const poem = getSavedPoems().find(p=>p.id==id);
  if (!poem) return;
  if (!confirm('¿Eliminar "' + poem.name + '"?')) return; // TODO: use alertVbModal
  // Close tab if this poem is open
  const openTab = tabs.find(t=>t.poem && t.poem.id==id);

/* ── File System Access (carpeta local) ──────────────────── */
let dirHandle = null;
const supportsFS = 'showDirectoryPicker' in window;

async function chooseFolder() {
  if (!supportsFS) { showToast('Tu navegador no soporta esta función'); return; }
  try {
    dirHandle = await window.showDirectoryPicker({ id: 'verbium-poems', mode: 'readwrite' });
    localStorage.setItem('verbium_folder_chosen', '1');
    showToast('Carpeta seleccionada: ' + dirHandle.name);
    updateFolderUI();
    await syncFolderPoems();
  } catch (e) { /* user cancelled */ }
}

async function restoreFolderHandle() {
  // Browsers don't persist handles across reloads without IndexedDB.
  // We simply prompt again on first save if a folder was chosen before.
  updateFolderUI();
}

function updateFolderUI() {
  const btn = document.getElementById('btn-choose-folder');
  if (btn) {
    if (!supportsFS) { btn.style.display = 'none'; }
    else {
      btn.title = dirHandle ? 'Carpeta destino: ' + dirHandle.name : 'Elegir carpeta destino';
      btn.classList.toggle('connected', !!dirHandle);
    }
  }
  // Update footer folder display
  const footerFolder = document.getElementById('footer-folder');
  const footerName = document.getElementById('footer-folder-name');
  if (footerFolder && footerName) {
    if (dirHandle) {
      footerName.textContent = dirHandle.name;
      footerFolder.style.display = 'inline';
    } else {
      footerFolder.style.display = 'none';
    }
  }
}

async function saveToFolder(name, text) {
  if (!dirHandle) return false;
  try {
    const fileHandle = await dirHandle.getFileHandle(name.replace(/[\\/:*?"<>|]/g,'-') + '.txt', { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(text);
    await writable.close();
    return true;
  } catch (e) { showToast('No se pudo guardar en la carpeta'); return false; }
}

async function syncFolderPoems() {
  if (!dirHandle) return;
  try {
    const poems = [];
    for await (const [filename, handle] of dirHandle.entries()) {
      if (handle.kind === 'file' && filename.endsWith('.txt')) {
        const file = await handle.getFile();
        const text = await file.text();
        poems.push({ id: filename, name: filename.replace(/\.txt$/,''), text, date: new Date(file.lastModified).toISOString(), fromFolder: true });
      }
    }
    poems.sort((a,b) => new Date(b.date) - new Date(a.date));
    window._folderPoems = poems;
    updateSavedPanel();
  } catch (e) {}
}

const CONTRACTIONS = new Map([
  ["d'el",["de","el"]],["d'él",["de","él"]],["pa'que",["para","que"]],
  ["pa'",["para"]],["pal",["para","el"]],["p'al",["para","el"]],
  ["p'alla",["para","alla"]],["pa'lla",["para","alla"]],
  ["pa'cá",["para","acá"]],["pa'ca",["para","aca"]]
]);

const UI_HIATO = new Set([
  'destruír','construír','incluír','excluír','fluír','huír',
  'aún','raúl','baúl'
]);

const COMMON_WORDS = new Set(['mi','si','vi','li','xi','ci','di','la','lo','le','se','me','te','de','el','al','un','en','es','su','tu']);
const STRESS_ADJ   = {aguda:1,llana:0,esdrujula:-1};
const STRESS_SIGN  = {aguda:'+', llana:'', esdrujula:'−'};
const STRESS_COLOR = {aguda:'var(--rust)',llana:'var(--ink50)',esdrujula:'var(--gold)'};
const LETTERS      = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

/* ── Helpers ────────────────────────────────────────────── */
const isVowel  = ch => !!ch && VOWELS.has(ch);
const isWeak   = ch => !!ch && WEAK.has(ch);
const isStrong = ch => !!ch && STRONG.has(ch);
const unaccent = ch => UNACCENT_MAP[ch] || ch;
const stripVC  = s  => s.replace(/[^a-záéíóúüñ]/gi,'');
const stripVCY = s  => s.replace(/[^a-záéíóúüñy]/gi,'');
const escHtml  = s  => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function expandContraction(word) {
  return CONTRACTIONS.get(word.toLowerCase()) ?? null;
}

/* ── Syllable cache ─────────────────────────────────────── */
const MAX_CACHE = 500;
const sylCache  = new Map();
function syllabifyCached(word) {
  if (sylCache.has(word)) return sylCache.get(word);
  const r = syllabify(word);
  if (sylCache.size >= MAX_CACHE) sylCache.delete(sylCache.keys().next().value);
  sylCache.set(word, r);
  return r;
}

/* ── Word-type checks ───────────────────────────────────── */
function isNumber(word) {
  const c = word.replace(STRIP_PUNCT,'').trim();
  if (!c) return false;

  if (/^(M{0,3})(CM|CD|D?C{0,3})(XC|XL|L?X{0,3})(IX|IV|V?I{0,3})$/i.test(c) && c.length > 0) {
    return !COMMON_WORDS.has(c.toLowerCase());

}
const numberToSyls = word => {
  const c = word.replace(STRIP_PUNCT,'').trim();
  return [/^[IVXLCDMivxlcdm]+$/.test(c) ? c.toUpperCase() : c];
};
const isYFinal     = word => { const c = word.replace(STRIP_PUNCT,'').toLowerCase().trim(); return c.length > 1 && c.length <= 4 && c !== 'muy' && /[aeiou][y]$/i.test(c) && !c.includes('ü'); };

/* ── Diphthong check ────────────────────────────────────── */
function isDiphthong(v1, v2, wordClean, nextChar) {
  // RAE exception: ẅ (gü digraph) + accented vowel = diphthong (lingüística)
  if (v1 === 'ẅ' && WEAK_ACCENT.has(v2)) return true;
  // RAE exception: ŵ (silent u in qu/gu) + any vowel = diphthong (aquí, equívoco, esquí)
  if (v1 === 'ŵ') return true;
  // RAE rule: two identical vowels = always hiato (antiinflamatorio, coordinación)
  if (v1 === v2) return false;
  if (WEAK_ACCENT.has(v1) || WEAK_ACCENT.has(v2)) return false;
  if (isStrong(v1) && isStrong(v2)) return false;
  if (nextChar === 'h') return true;
  if (isWeak(v1) && isWeak(v2)) return wordClean ? !UI_HIATO.has(wordClean) : true;
  return (isWeak(v1) && isStrong(v2)) || (isStrong(v1) && isWeak(v2));
}

/* ── Core syllabifier ───────────────────────────────────── */
function syllabify(word) {
  let clean = word.replace(STRIP_PUNCT,'').toLowerCase().trim();
  if (!clean) return [];
  const expanded = expandContraction(clean);
  if (expanded)          return expanded;
  if (isNumber(clean))   return numberToSyls(clean);
  if (isYFinal(clean))   return [clean];
  const wordClean = clean.replace(/[ŵẅ]/g,'u').replace(/ü/g,'u');
  clean = clean.replace(/qu([eéiíoóuúaá])/g,'qŵ$1').replace(/gu([eéiíoóuúaá])/g,'gŵ$1').replace(/gü/g,'gẅ');
  const L = [...clean], N = L.length;
  let pos = 0;
  const syls = [];
  while (pos < N) {
    let syl = '';
    while (pos < N && !isVowel(L[pos])) syl += L[pos++];
    if (pos >= N) { if (syl) (syls.length ? syls[syls.length-1] += syl : syls.push(syl)); break; }
    syl += L[pos++];
    let la = pos;
    while (la < N && L[la] === 'h') la++;
    // Only bridge h for diphthong if h is truly intervocalic
    // (i.e. the char before the current vowel is not a consonant that suggests h belongs to next onset)
    const hIsBridge = (la === pos) || (pos >= 2 && isVowel(L[pos-2]));
    if (la < N && isVowel(L[la]) && hIsBridge) {
      if (isDiphthong(L[pos-1], L[la], wordClean, L[la-1])) {
        while (pos < la) syl += L[pos++];
        syl += L[pos++];
        // Triptongo check: add trailing weak vowel
        if (pos < N && isVowel(L[pos]) && isWeak(L[pos]) && !WEAK_ACCENT.has(L[pos])) syl += L[pos++];
        // Special case: after qŵ/gŵ onset, 'i'+'e/a/o' forms diphthong (quien, quiero, guia)
        else if (pos < N && isVowel(L[pos]) && isStrong(L[pos]) && syl.match(/^[qg]ŵ.*[iu]$/)) syl += L[pos++];
      }
    }
    const cs = pos;
    while (pos < N && !isVowel(L[pos])) pos++;
    const cons = L.slice(cs, pos);
    if (!cons.length)   { syls.push(syl); }
    else if (pos >= N)  { syls.push(syl + cons.join('')); }
    else {
      const sp = cons.length <= 1 ? 0 : (ONSET_CLUSTERS.has(cons.slice(-2).join('')) ? cons.length-2 : cons.length-1);
      syls.push(syl + cons.slice(0,sp).join(''));
      pos = cs + sp;
    }
  }
  return (syls.length ? syls : [clean]).map(s => {
    const isTriphthong = s.includes('ẅ');
    const restored = s.replace(/ŵ/g,'u').replace(/ẅ/g,'ü');
    return isTriphthong ? restored : treatYAsVowel(restored);
  });
}

/* ── Tonic index ────────────────────────────────────────── */
function tonicIndex(word) {
  const clean = word.replace(STRIP_PUNCT,'').toLowerCase().trim();
  if (!clean || isNumber(clean) || isYFinal(clean)) return 0;
  const syls = syllabifyCached(clean), n = syls.length;
  if (!n) return 0;
  for (let i = 0; i < n; i++) if (/[áéíóú]/.test(syls[i])) return i;
  if (n === 1) return 0;
  return /[aeioun s]/.test(clean[clean.length-1]) ? n-2 : n-1;
}
function buildTonicMap(wordSyllables) {
  const map = [];
  for (const {word,syllables} of wordSyllables) {
    const ti = tonicIndex(word);
    syllables.forEach((_,i) => map.push(i === ti));
  }
  return map;
}
function buildMetricTonicMap(wordSyllables, sylData) {
  const gramTonic = [];
  for (const {word,syllables} of wordSyllables) {
    const ti = tonicIndex(word);
    syllables.forEach((_,i) => gramTonic.push(i === ti));
  }
  const metricTonic = [];
  let gi = 0;
  while (gi < sylData.length) {
    if (sylData[gi].sinalefa && gi+1 < sylData.length) {
      metricTonic.push(gramTonic[gi] || gramTonic[gi+1]);
      gi += 2;
    } else {
      metricTonic.push(gramTonic[gi]);
      gi++;
    }
  }
  return metricTonic;
}

/* ── Char helpers ───────────────────────────────────────── */
function effectiveLastChar(syl) {
  let ch = stripVCY(syl).slice(-1).toLowerCase();
  const sylClean = syl.replace(STRIP_PUNCT,'').toLowerCase().trim();
  if (ch==='y' && sylClean !== 'muy' && syl.length>1 && /[aeiouáéíóú]/.test(syl[syl.length-2])) ch='i';
  return ch;
}
function effectiveFirstChar(syl, word) {
  if (treatAsVowelY(word)) return 'i';
  return syl.replace(/^h/i,'').replace(/[^a-záéíóúüñy]/gi,'').slice(0,1).toLowerCase();
}

/* ── Token builder ──────────────────────────────────────── */
function makeToken(w) {
  const c = w.replace(STRIP_PUNCT,'').toLowerCase();
  const exp = expandContraction(c);
  if (exp) return exp;
  if (c === 'y' || c === 'é') return ['i'];
  if (isNumber(c)) return numberToSyls(c);
  return syllabifyCached(w);
}
function tokenize(line) {
  const tokens = [];
  for (const w of line.trim().split(/\s+/).filter(Boolean)) {
    const hm = w.match(/^([A-Za-záéíóúüñÁÉÍÓÚÜÑ]+)-([\S]+)$/i);
    if (hm) {
      const [, left, right] = hm;
      if (VOWELS.has(left.toLowerCase().slice(-1))) {
        tokens.push({word:left,  syllables:makeToken(left),  blockSinalefa:true,  sineresis:[],dieresis:[],isNumber:isNumber(left),  isContraction:false});
        tokens.push({word:right, syllables:makeToken(right), blockSinalefa:false, sineresis:[],dieresis:[],isNumber:isNumber(right), isContraction:false});
        continue;
      }
    }
    tokens.push({word:w, syllables:makeToken(w), blockSinalefa:false, sineresis:[],dieresis:[],isNumber:isNumber(w), isContraction:expandContraction(w.toLowerCase())!==null});
  }
  return tokens;
}

/* ── Phonological adjustments ───────────────────────────── */
function applySineresis(syls) {
  if (syls.length <= 1) return {syls, marks:[]};
  const result=[], marks=[];
  let i=0;
  while (i < syls.length) {
    const cur=syls[i], nxt=syls[i+1];
    if (nxt !== undefined) {
      const ce = stripVC(cur).slice(-1).toLowerCase();
      const ns = stripVC(nxt).slice(0,1).toLowerCase();
      if (isVowel(ce) && isVowel(ns) && !isDiphthong(ce,ns,null,null)
        && !WEAK_ACCENT.has(ce) && !WEAK_ACCENT.has(ns)
        && !/[áéíóú]/.test(cur) && !/[áéíóú]/.test(nxt)
        && !(isStrong(ce) && isStrong(ns))
        && ce !== ns) {
        result.push(cur+nxt); marks.push(result.length-1); i+=2; continue;
      }
    }
    result.push(cur); i++;
  }
  return {syls:result, marks};
}

        && (WEAK_ACCENT.has(v1)||WEAK_ACCENT.has(v2)||v1==='ü'||v2==='ü')

      }
    }
    if (split > 0) { marks.push(result.length); result.push(chars.slice(0,split).join('')); result.push(chars.slice(split).join('')); }

}
function applySinalefa(wordSyllables) {
  const result=[], n=wordSyllables.length;
  for (let w=0; w<n; w++) {
    const {word,syllables,blockSinalefa,isNumber:isNum,isContraction}=wordSyllables[w];
    const m=syllables.length;
    for (let s=0; s<m; s++) {
      const isLast=s===m-1, isLastWord=w===n-1;
      let sinalefa=false, hiato=false, divisionHyphen=false, hiatoMetrico=false;
      if (isLast && !isLastWord) {
        const next=wordSyllables[w+1];
        if (blockSinalefa||isNum||isContraction) {
          divisionHyphen=true;
        } else if (treatAsVowelY(word)) {
          const fc=next.syllables[0].replace(/^h/i,'').replace(/[^a-záéíóúüñ]/gi,'').slice(0,1).toLowerCase();
          if (isVowel(fc)) sinalefa=true;
        } else {
          const lc=effectiveLastChar(syllables[s]);
          if (isVowel(lc) && next?.syllables.length && !next.isNumber) {

function detectCesura(sylData) {

    if (sylData[i].sinalefa) skip=true;

}
function countPoetic(sylData) {
  let count=0, skip=false;
  for (const s of sylData) { if(skip){skip=false;continue;} count++; if(s.sinalefa)skip=true; }
  return count;
}
function lastWordStress(word) {
  const clean=word.replace(STRIP_PUNCT,'').toLowerCase().trim();
  if (!clean || isNumber(clean)) return 'llana';
  if (isYFinal(clean)) return 'aguda';
  const syls=syllabifyCached(clean), n=syls.length;
  if (n<=1) return 'aguda';
  for (let i=0; i<n; i++) {
    if (/[áéíóú]/.test(syls[i])) {
      if (i===n-1) return 'aguda';
      if (i===n-2) return 'llana';
      return 'esdrujula';
    }
  }
  return /[aeioun s]/.test(clean.slice(-1)) ? 'llana' : 'aguda';

/* ── Line analysis ──────────────────────────────────────── */
function analyzeLine(line) {
  const raw = tokenize(line);
  if (!raw.length) return null;
  const ws = raw.map(tok => {
    const {syls:s1,marks:sm} = applySineresis(tok.syllables);
    const {syls:s2,marks:dm} = applyDieresis(s1);
    return {...tok, syllables:s2, sineresis:sm, dieresis:dm};
  });
  let sylData = applySinalefa(ws);
  const stress  = lastWordStress(ws[ws.length-1].word);
  const adj     = STRESS_ADJ[stress];
  let cesuraIdx = -1;
  if (countPoetic(sylData)+adj === 14) {
    cesuraIdx = detectCesura(sylData);
    if (cesuraIdx >= 0 && sylData[cesuraIdx].sinalefa)
      sylData[cesuraIdx] = {...sylData[cesuraIdx], sinalefa:false, hiatoMetrico:true};
  }
  const baseCount = countPoetic(sylData);
  const tonicMap  = buildMetricTonicMap(ws, sylData);

    words:ws.map(t=>t.word), wordSyllables:ws, sylData, tonicMap,

/* ── Rhyme ──────────────────────────────────────────────── */
function getRhymeSounds(word) {
  const clean=word.replace(STRIP_PUNCT,'').toLowerCase().trim();
  if (!clean) return {consonant:'',assonant:''};
  if (isNumber(clean)) return {consonant:clean,assonant:clean};
  if (isYFinal(clean)) { const w=clean.slice(0,-1)+'i'; return {consonant:w,assonant:w}; }
  const syls=syllabifyCached(clean), n=syls.length;
  let idx=syls.findIndex(s=>/[áéíóú]/.test(s));
  if (idx===-1) idx=Math.max(0,/[aeioun s]/.test(clean.slice(-1))?n-2:n-1);
  const part=syls.slice(idx).join('');
  return {
    consonant:[...part].map(unaccent).join(''),
    assonant: [...part].filter(ch=>VOWELS.has(ch)).map(unaccent).join('')
  };
}
function assignRhymes(results) {
  const consMap={}, assoMap={};
  let counter=0;
  for (const r of results.filter(Boolean)) {
    const {consonant,assonant}=getRhymeSounds(r.words[r.words.length-1]);
    if (!consonant) { r.rhymeLabel='—'; r.rhymeType=''; continue; }
    if (consMap[consonant]!==undefined) {
      r.rhymeLabel=consMap[consonant]; r.rhymeType='c';
    } else if (assoMap[assonant]!==undefined) {
      const l=assoMap[assonant];
      consMap[consonant]=l;
      r.rhymeLabel=l; r.rhymeType='a';
    } else {
      const l=LETTERS[counter++%26];
      consMap[consonant]=l; assoMap[assonant]=l;
      r.rhymeLabel=l; r.rhymeType='c';
    }
  }
}

/* ── Render ─────────────────────────────────────────────── */
function renderDivided(sylData, cesuraIdx, tonicMap, sinMarks=[], dieMarks=[]) {
  // Motor interno completo — interfaz limpia para el usuario
  const parts = [];
  let i = 0;
  while (i < sylData.length) {
    const cur = sylData[i];
    if (cur.sinalefa && i + 1 < sylData.length) {
      parts.push(cur.text + sylData[i+1].text);
      i += 2;
    } else {
      parts.push(cur.text);
      i++;
    }
  }
  const SEP = '<span style="color:var(--ink30);margin:0 3px;font-size:.85em">·</span>';
  return '<div class="syl-line">'
    + parts.filter(Boolean).map(p => `<span>${p}</span>`).join(SEP)
    + '</div>';
}


/* ── State ──────────────────────────────────────────────── */
let currentResults = null;
const $ = id => document.getElementById(id);

/* ── Main analyze ───────────────────────────────────────── */
function analyzePoem() {
  const tab = getActiveTab();
  const tid = tab ? tab.id : null;
  const taEl = tid ? document.getElementById('ta-'+tid) : null;
  const raw = taEl ? taEl.value : '';
  const resultsEl = tid ? document.getElementById('results-'+tid) : null;
  if (!raw.trim()) { if(resultsEl) resultsEl.style.display='none'; return; }
  const text = cleanPoemText(raw);

  const results = text.split('\n').map(line => {
    if (!line.trim()) return null;
    const r = analyzeLine(line);
    if (!r) return null;
    const sinAll=[], dieAll=[];
    let offset=0;
    for (const word of r.wordSyllables) {
      word.sineresis.forEach(pos => sinAll.push(offset+pos));
      word.dieresis.forEach( pos => dieAll.push(offset+pos));
      offset += word.syllables.length;
    }
    return {...r, line, sineresisMarks:sinAll, dieresisMarks:dieAll};
  });

  const valid = results.filter(Boolean);
  if (!valid.length) { if(resultsEl){resultsEl.style.display='none';} return; }

  assignRhymes(results);
  currentResults = results;

  /* Stats */
  const counts   = valid.map(r => r.count);
  const total    = valid.length;
  const totalSyl = counts.reduce((a,b)=>a+b,0);
  const avg      = (totalSyl/total).toFixed(1);
  const minC     = Math.min(...counts), maxC=Math.max(...counts);
  const dominant = [...new Set(counts)].sort((a,b)=>counts.filter(x=>x===b).length-counts.filter(x=>x===a).length)[0];
  const isIso    = new Set(counts).size === 1;
  const metroName= VERSE_NAMES[dominant] || dominant+' síl.';
  const patron   = isIso ? 'Regular' : 'Irregular';
  const tendencia= VERSE_NAMES[dominant] ? VERSE_NAMES[dominant].replace('ílabo','').replace('ísílabo','') : dominant+' síl.';
  const rhymePattern = valid.map(r => r.rhymeLabel||'—').join('');

  document.getElementById('mg-'+tid).innerHTML=`
    <div class="metric-card"><div class="metric-value">${totalSyl}</div><div class="metric-label">Total síl.</div></div>
    <div class="metric-card"><div class="metric-value">${avg}</div><div class="metric-label">Promedio</div></div>
    <div class="metric-card"><div class="metric-value">${minC}</div><div class="metric-label">Mínimo</div></div>
    <div class="metric-card"><div class="metric-value">${maxC}</div><div class="metric-label">Máximo</div></div>
    <div class="metric-card"><div class="metric-value">${patron}</div><div class="metric-label">Patrón</div></div>
    <div class="metric-card"><div class="metric-value">${tendencia}</div><div class="metric-label">Tendencia</div></div>
    <div class="metric-card"><div class="metric-value">${rhymePattern}</div><div class="metric-label">Rima</div></div>`;

  /* Chart */
  const maxBar = Math.max(...counts, 1);
  const barHeight = 180;
  function detectRitmoBar(tonicMap, count) {
    const mm = Array.isArray(tonicMap) ? tonicMap : Object.keys(tonicMap).map(Number).sort((a,b)=>a-b).map(i=>!!tonicMap[i]);
    const has = n => n>=1 && n<=mm.length && mm[n-1]===true;
    const t = mm.map((v,i)=>v?i+1:null).filter(Boolean);
    if (!t.length) return 'Irregular';
    if (count>=10&&count<=12) {
      function score(req, bon, forb) {
        let s=0;
        for (const n of req)  s += has(n) ? 3 : -2;
        for (const n of bon)  s += has(n) ? 1 : 0;
        for (const n of forb) s += has(n) ? -3 : 0;
        return s;
      }
      const scores = {
        'Heroico':  score([2,6],[4,8,10],[3,5]),
        'Melódico': score([6],[3,5,10],[2,4]),
        'Sáfico':   score([4,8],[10],[2,3,6]),
        'Enfático': score([1,6],[10],[2,3,4,5]),
      };
      const best = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
      if (best[1] > 0) return best[0];
    }
    const evens=t.filter(x=>x%2===0), odds=t.filter(x=>x%2!==0);
    if (evens.length>=2&&evens.length>odds.length) return 'Yámbico';
    if (odds.length>=2&&odds.length>evens.length) return 'Trocaico';
    if (t.filter(x=>(x-1)%3===0).length>=2) return 'Dactílico';
    return 'Irregular';
  }
  document.getElementById('bc-'+tid).innerHTML = valid.map((r,i) => {
    const h = Math.round(r.count/maxBar*barHeight);
    const isRegular = r.count === 8 || r.count === 11;
    const barColor = isRegular ? '#15803d' : '#b8922a';
    const ritmo = detectRitmoBar(r.tonicMap, r.count);
    const RITMO_COLORS = {'Heroico':'#8b3a0f','Melódico':'#15803d','Sáfico':'#1d4ed8','Enfático':'#0369a1','Yámbico':'#b8922a','Trocaico':'#7e22ce','Dactílico':'#be123c','Irregular':'rgba(28,26,22,.4)'};
    const ritmoColor = RITMO_COLORS[ritmo] || 'rgba(28,26,22,.4)';
    return `<div class="bar-item">
      <div class="bar-top-num" style="color:${barColor}">${r.count}</div>
      <div class="bar-area"><div class="bar-fill" style="height:${h}px;background:${barColor}" title="Verso ${i+1}: ${r.count} sílabas — ${ritmo}"></div></div>
      <div class="bar-lbl" style="color:${ritmoColor};font-weight:600">${ritmo}</div>
    </div>`;
  }).join('');

  /* Table */
  const tbody = document.getElementById('rb-'+tid);
  tbody.innerHTML = '';
  let rowNum = 0;
  for (const r of results) {
    const tr = document.createElement('tr');
    if (!r) {
      tr.style.cssText='background:var(--border)';
      tr.innerHTML=`<td colspan="5" style="padding:.2rem;border-bottom:1px solid var(--border)"></td>`;
      tbody.appendChild(tr); continue;
    }
    rowNum++;
    tr.className = REGULAR_COUNTS.has(r.count) ? 'verse-regular' : 'verse-irregular';
    const sign = STRESS_SIGN[r.stress]
      ? `<span style="font-size:.58rem;font-weight:700;vertical-align:super;color:${STRESS_COLOR[r.stress]}">${STRESS_SIGN[r.stress]}</span>`
      : '';
    tr.innerHTML=`
      <td class="td-num"      data-label="#">${rowNum}</td>
      <td class="td-original" data-label="Verso">${escHtml(r.line)}</td>
      <td class="td-divided"  data-label="División">${renderDivided(r.sylData,r.cesuraIdx,r.tonicMap,r.sineresisMarks,r.dieresisMarks)}</td>
      <td class="td-count"    data-label="Sílabas"><span class="count-num">${r.count}</span>${sign}</td>
      <td class="td-type"     data-label="Rima"><span style="font-size:1rem;font-weight:600;color:var(--rust)">${r.rhymeLabel||'—'}${r.rhymeLabel&&r.rhymeLabel!=='—'?`<sup style="font-size:.55rem;font-weight:500;color:var(--ink50)">${r.rhymeType||''}</sup>`:''}</span></td>`;
    tbody.appendChild(tr);
  }

  if(resultsEl){resultsEl.style.display='flex';}
}

const getSavedPoems = () => {
  const local = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch { return []; } })();
  if (dirHandle && window._folderPoems) return window._folderPoems;
  return local;
};
async function savePoemToStorage(name, text) {
  if (dirHandle) {
    const ok = await saveToFolder(name, text);
    if (ok) { await syncFolderPoems(); return; }
  }
  const poems = getSavedPoems();
  poems.unshift({id:Date.now(), name:name.trim(), text, date:new Date().toISOString()});
  if (poems.length > 20) poems.pop();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(poems));
  updateSavedPanel();
}
async function deletePoemFromStorage(id) {

/* ── Modal system (Editorium style) ─────────────────────── */
let _modalOnCancel = null;
let _modalConfirmed = false;

const GENERIC_NAMES = ['sin título','sin titulo','untitled','nuevo','new','nota','note','poema','poem',''];

function isGenericName(name) {
  return GENERIC_NAMES.includes(name.trim().toLowerCase().replace(/\.txt$/,''));
}

function openVbModal(html, onConfirm, onCancel) {
  _modalOnCancel = onCancel || null;
  _modalConfirmed = false;
  const box = $('vb-modal-box');
  const overlay = $('vb-overlay');
  box.innerHTML = html;
  overlay.classList.remove('hidden');

  function tryConfirm() {
    const result = onConfirm();
    if (result && typeof result.then === 'function') {
      const okBtn = box.querySelector('[data-ok]');
      if (okBtn) okBtn.disabled = true;
      result.then(r => {
        if (okBtn) okBtn.disabled = false;
        if (r !== false) { _modalConfirmed = true; closeVbModal(); }
      }).catch(() => { if (okBtn) okBtn.disabled = false; });
    } else if (result !== false) {
      _modalConfirmed = true;
      closeVbModal();
    }
  }

  const cancelBtn = box.querySelector('[data-cancel]');
  const okBtn = box.querySelector('[data-ok]');
  if (cancelBtn) cancelBtn.addEventListener('click', closeVbModal);
  if (okBtn) okBtn.addEventListener('click', tryConfirm);
  box.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.tagName !== 'SELECT' && okBtn) { e.preventDefault(); tryConfirm(); }
    if (e.key === 'Escape') closeVbModal();
  });
  const firstInput = box.querySelector('input');
  if (firstInput) { firstInput.focus(); firstInput.select(); }
}

function closeVbModal() {
  $('vb-overlay').classList.add('hidden');
  if (!_modalConfirmed && _modalOnCancel) { const fn = _modalOnCancel; _modalOnCancel = null; fn(); }
  _modalOnCancel = null;
}

function alertVbModal(msg) {
  return new Promise(resolve => {
    openVbModal(
      `<h2 style="margin-bottom:12px">Aviso</h2><p style="color:var(--ink50);margin-bottom:20px">${msg}</p><div class="modal-actions"><button data-ok class="btn-primary">Entendido</button></div>`,
      () => { resolve(); return true; }
    );
  });
}

/* ── Save system ─────────────────────────────────────────── */
function showSaveModal() { saveActiveTab(); }

async function saveActiveTab() {
  const tab = getActiveTab();
  if (!tab) return;
  const ta = document.getElementById('ta-'+tab.id);
  if (!ta || !ta.value.trim()) { showToast('No hay poema para guardar'); return; }
  tab.text = ta.value;

  // Already saved and linked to storage → overwrite directly
  if (tab.poem) {
    await writePoemToStorage(tab, tab.poem.name, tab.text);
    return;
  }

  // New tab → force name
  forceNameThenSave(tab);
}

function forceNameThenSave(tab, initialError) {
  const prefill = isGenericName(tab.name) ? '' : escHtml(tab.name);
  openVbModal(
    `<h2 style="margin-bottom:8px">Nombra tu poema</h2>
     <label style="font-size:.8rem;color:var(--ink50);margin-bottom:6px;display:block">Nombre del archivo</label>
     <input type="text" id="vb-name-input" placeholder="ej: soneto-a-la-luna" value="${prefill}" autocomplete="off" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font:inherit;background:var(--bg);color:var(--ink);margin-bottom:6px">
     <div id="vb-name-error" style="color:var(--rust);font-size:.78rem;min-height:18px;margin-bottom:12px">${initialError||''}</div>
     <div class="modal-actions">
       <button data-cancel>Cancelar</button>
       <button data-ok class="btn-primary">Guardar</button>
     </div>`,
    async () => {
      const name = document.getElementById('vb-name-input').value.trim();
      if (isGenericName(name)) {
        document.getElementById('vb-name-error').textContent = 'Escribe un nombre específico para tu poema.';
        return false;
      }
      const result = await writePoemToStorage(tab, name, tab.text);
      if (result === 'duplicate') {
        document.getElementById('vb-name-error').textContent = 'Ya existe un poema con este nombre.';
        return false;
      }
      return true;
    }
  );
}

async function writePoemToStorage(tab, name, text) {
  // Save to folder if available
  if (dirHandle) {
    const filename = name.replace(/[\//:*?"<>|]/g,'-') + '.txt';
    try {
      // Check duplicate (only if it's a different file than this tab's current)
      const isNewTarget = !tab.poem || tab.poem.name !== name;
      if (isNewTarget) {
        let exists = false;
        try { await dirHandle.getFileHandle(filename); exists = true; } catch(e) {}
        if (exists) return 'duplicate';
      }
      const fh = await dirHandle.getFileHandle(filename, {create:true});
      const wr = await fh.createWritable();
      await wr.write(text);
      await wr.close();
      // Update tab
      const poem = {id: filename, name, text, date: new Date().toISOString(), fromFolder:true};
      tab.name = name; tab.poem = poem; tab.dirty = false;
      renderTabsBar();
      await syncFolderPoems();
      showToast('Guardado: ' + name);
      return 'ok';
    } catch(e) {
      await alertVbModal('No se pudo guardar: ' + e.message);
      return 'error';
    }
  }

  // localStorage fallback
  const poems = getSavedPoems();
  const isNewTarget = !tab.poem || tab.poem.name !== name;
  if (isNewTarget) {
    const exists = poems.find(p=>p.name.toLowerCase()===name.toLowerCase());
    if (exists) return 'duplicate';
  }
  const now = new Date().toISOString();
  let poem;
  if (tab.poem && tab.poem.name === name) {
    // Overwrite same poem
    const updated = poems.map(p=>p.id==tab.poem.id?{...p,text,date:now}:p);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
    poem = {...tab.poem, text, date:now};
  } else {
    // New poem
    poem = {id:Date.now(), name, text, date:now};
    poems.unshift(poem);
    if (poems.length>50) poems.pop();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(poems));
  }
  tab.name = name; tab.poem = poem; tab.dirty = false;
  renderTabsBar();
  renderSidebar();
  showToast('Guardado: ' + name);
  return 'ok';
}

let toastTimer;

  const t=$('copy-toast');
  t.textContent=msg;
  t.classList.add('show');

  toastTimer=setTimeout(()=>{ t.classList.remove('show'); t.textContent='✓ Copiado al portapapeles'; }, 2200);

/* ── Clipboard ──────────────────────────────────────────── */

function cleanPoemText(text) {
  return text.split('\n').map(line => {
    return line
      .replace(/^\s*#+\s*/,'')                            // ### markdown headings
      .replace(/\b\d+\s*[\+\*=]\s*\d+\s*[=\+\*]?\s*\d*\b/g,'')           // math: 7+1=8 3*4=12
      .replace(/^\s*\d+(?=[a-zA-ZáéíóúüñÁÉÍÓÚÜÑ])/,'')  // number glued to word at start
      .replace(/\(\s*\d+\s*\)/g,'')                       // (1) inline
      .replace(/\[\s*\d+\s*\]/g,'')                       // [1] inline
      .replace(/[()[\]]/g,'')                              // remaining parens/brackets
      .replace(/\|/g,'')                                  // pipe characters
      .replace(/-/g,'')                                    // dashes (preserve spaces)
      .replace(/^\s*[-–—]\s*/,'')                         // leading dash after number removal
      .replace(/\s+\d+\s*$/,'')                           // trailing number at end of line
      .replace(/\s{2,}/g,' ')
      .trim();
  })
  .filter(line => line.length > 0)
  .join('\n')
  .trim();
}

function copyPoem() {
  const tab = getActiveTab();
  const ta = tab ? document.getElementById('ta-'+tab.id) : null;
  const text = ta ? ta.value.trim() : '';
  if (!text) { showToast('No hay texto para copiar'); return; }
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ Copiado al portapapeles');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ Copiado al portapapeles');
  });
}

function requireFolder() {

  if (box) {
    if (!supportsFS) {
      box.innerHTML =
        '<div style="font-size:4rem;margin-bottom:20px">⚠️</div>' +
        '<p style="font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:12px;line-height:1.5">Este navegador no permite guardar en una carpeta de tu equipo.</p>' +
        '<p style="font-size:.85rem;color:var(--ink50);line-height:1.5">Abre Verbium en Chrome, Edge u Opera de escritorio para poder trabajar.</p>';
    } else {
      box.innerHTML =
        '<div style="font-size:4rem;margin-bottom:20px">📁</div>' +
        '<p style="font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:12px;line-height:1.5">Elige una carpeta para comenzar</p>' +
        '<p style="font-size:.82rem;color:var(--ink50);line-height:1.5;margin-bottom:20px">Verbium guarda cada poema como un archivo en la carpeta que elijas. Sin carpeta no puede funcionar.</p>' +
        '<button class="btn-primary" style="width:100%" onclick="chooseFolderAndStart()">Elegir carpeta</button>';
    }
  }
  modal.classList.remove('hidden');
}

window.onload = () => {
  loadTheme();
  updateFolderUI();
  renderSidebar();
  // La carpeta es opcional: no se exige al comenzar. Se puede elegir luego
  // desde el botón "Elegir carpeta" del panel izquierdo.
  $('folder-modal').classList.add('hidden');
};



</script>
</body>
</html>
